.page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { border-radius: 22px; padding: 30px 26px 34px; width: 100%; max-width: 370px; display: flex; flex-direction: column; gap: 20px; background: #202026; border: 1px solid #30303A; }
.header { display: flex; align-items: center; gap: 14px; }
.emoji { font-size: 38px; line-height: 1; }
.title { font-size: 21px; font-weight: 800; color: #DDDDF0; letter-spacing: -0.3px; }
.subtitle { font-size: 13px; color: #62627A; margin-top: 3px; }
.divider { height: 1px; background: #30303A; }
.section { display: flex; flex-direction: column; gap: 10px; }
.label { font-size: 11px; font-weight: 700; color: #62627A; letter-spacing: 0.6px; text-transform: uppercase; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
.chip { padding: 9px 4px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; background: #28282F; color: #88889A; border: 1px solid #30303A; }
.chip.active-work { background: #C8906A; color: #FFF4EE; border-color: #C8906A; }
.chip.active-break { background: #6A9EB0; color: #EEF6FF; border-color: #6A9EB0; }
.summary { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 11px 16px; border-radius: 12px; background: #28282F; border: 1px solid #30303A; font-size: 14px; flex-wrap: wrap; }
.start-btn { width: 100%; padding: 15px; border: none; border-radius: 13px; font-size: 16px; font-weight: 700; color: #160E08; cursor: pointer; font-family: inherit; background: #C8906A; }

/* Running screen */
.run-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Sarabun', sans-serif; transition: background 1.2s ease; }
.run-page.work { background: linear-gradient(160deg, #1E1610 0%, #18181C 65%); }
.run-page.break { background: linear-gradient(160deg, #101820 0%, #18181C 65%); }
.run-wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; }
.phase-badge { padding: 8px 22px; border-radius: 24px; font-size: 15px; font-weight: 700; }
.phase-badge.work { background: #2A1F18; color: #C8906A; border: 1px solid #7A4A28; }
.phase-badge.break { background: #182028; color: #6A9EB0; border: 1px solid #325E70; }
.round-label { font-size: 13px; color: #62627A; font-weight: 500; }
.circle-wrap { position: relative; width: 256px; height: 256px; }
.time-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.time-num { font-size: 60px; font-weight: 800; letter-spacing: -3px; line-height: 1; font-variant-numeric: tabular-nums; transition: color 1.2s ease; }
.time-num.work { color: #C8906A; }
.time-num.break { color: #6A9EB0; }
.break-hint { font-size: 13px; color: #325E70; margin-top: 6px; }
.info-row { display: flex; gap: 24px; align-items: center; padding: 12px 28px; border-radius: 14px; background: #202026; border: 1px solid #30303A; }
.info-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.info-key { font-size: 11px; color: #62627A; font-weight: 600; }
.info-val-work { font-size: 15px; font-weight: 700; color: #C8906A; }
.info-val-break { font-size: 15px; font-weight: 700; color: #6A9EB0; }
.divider-v { width: 1px; height: 24px; background: #30303A; }
.stop-btn { padding: 11px 36px; background: transparent; border: 1px solid #30303A; border-radius: 12px; font-size: 14px; font-weight: 600; color: #62627A; cursor: pointer; font-family: inherit; }

  </style>
</head>
<body>

<div id="app"></div>

<script>
  const WORK_OPTIONS = [5, 10, 15, 25, 45, 60];
  const BREAK_OPTIONS = [5, 10, 15, 20, 30, 60];
  const pad = n => String(n).padStart(2, "0");

  let state = {
    screen: "setup",
    workMin: 25,
    breakMin: 5,
    phase: "work",
    round: 1,
    secondsLeft: 0,
  };

  // ตัวแปรแยกสำหรับค่าที่ interval ต้องอ่านให้ถูกต้องเสมอ (ไม่ถูก closure กัก)
  let _phase = "work";
  let _round = 1;
  let _phaseEndTime = null;
  let intervalId = null;

  function setState(patch) {
    state = { ...state, ...patch };
    render();
  }

  function syncFromNow() {
    if (!_phaseEndTime) return;
    let remaining = Math.round((_phaseEndTime - Date.now()) / 1000);
    if (remaining > 0) { setState({ secondsLeft: remaining }); return; }

    let elapsed = -remaining;
    let curPhase = _phase;
    let curRound = _round;

    while (true) {
      const dur = curPhase === "work" ? state.workMin * 60 : state.breakMin * 60;
      if (elapsed < dur) { remaining = dur - elapsed; break; }
      elapsed -= dur;
      const next = curPhase === "work" ? "break" : "work";
      if (next === "work") curRound++;
      curPhase = next;
    }

    _phase = curPhase;
    _round = curRound;
    _phaseEndTime = Date.now() + remaining * 1000;
    setState({ phase: curPhase, round: curRound, secondsLeft: remaining });
  }

  function start() {
    if (intervalId) return; // ป้องกัน double tap
    const duration = state.workMin * 60;
    _phase = "work";
    _round = 1;
    _phaseEndTime = Date.now() + duration * 1000;
    clearInterval(intervalId);
    intervalId = setInterval(syncFromNow, 500);
    setState({ screen: "running", phase: "work", round: 1, secondsLeft: duration });
  }

  function stop() {
    clearInterval(intervalId);
    intervalId = null;
    _phaseEndTime = null;
    setState({ screen: "setup" });
  }

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && state.screen === "running") syncFromNow();
  });

  function render() {
    const { screen, workMin, breakMin, phase, round, secondsLeft } = state;
    const isWork = phase === "work";
    const minutes = Math.floor(secondsLeft / 60);
    const seconds = secondsLeft % 60;
    const totalSec = (isWork ? workMin : breakMin) * 60;
    const progress = secondsLeft / totalSec;
    const R = 108;
    const circ = 2 * Math.PI * R;
    const dash = circ * progress;
    const app = document.getElementById("app");

    if (screen === "setup") {
      app.innerHTML = `
        <div class="page" style="background:#18181C">
          <div class="card">
            <div class="header">
              <span class="emoji">🍅</span>
              <div>
                <div class="title">โปโมโดโร</div>
                <div class="subtitle">ตั้งค่าแล้วปล่อยให้มันทำงาน</div>
              </div>
            </div>
            <div class="divider"></div>
            <div class="section">
              <div class="label">🧠 ช่วงทำงาน</div>
              <div class="grid">
                ${WORK_OPTIONS.map(m => `<button class="chip ${workMin===m?'active-work':''}" onclick="setWork(${m})">${m}<span style="font-size:10px;margin-left:2px;opacity:0.65">นาที</span></button>`).join("")}
              </div>
            </div>
            <div class="section">
              <div class="label">☕ ช่วงพัก</div>
              <div class="grid">
                ${BREAK_OPTIONS.map(m => `<button class="chip ${breakMin===m?'active-break':''}" onclick="setBreak(${m})">${m}<span style="font-size:10px;margin-left:2px;opacity:0.65">นาที</span></button>`).join("")}
              </div>
            </div>
            <div class="divider"></div>
            <div class="summary">
              <span style="color:#C8906A;font-weight:600">🧠 ${workMin} นาที</span>
              <span style="color:#62627A;font-size:12px">→</span>
              <span style="color:#6A9EB0;font-weight:600">☕ ${breakMin} นาที</span>
              <span style="color:#62627A;font-size:12px">→ วนซ้ำ</span>
            </div>
            <button class="start-btn" onclick="start()">เริ่มเลย →</button>
          </div>
        </div>`;
    } else {
      app.innerHTML = `
        <div class="run-page ${isWork?'work':'break'}">
          <div class="run-wrap">
            <div class="phase-badge ${isWork?'work':'break'}">${isWork?"🧠 กำลังทำงาน":"☕ พักผ่อน"}</div>
            <div class="round-label">รอบที่ ${round}</div>
            <div class="circle-wrap">
              <svg width="256" height="256" viewBox="0 0 256 256">
                <circle cx="128" cy="128" r="120" fill="none" stroke="${isWork?'#2A1F18':'#182028'}" stroke-width="1"/>
                <circle cx="128" cy="128" r="${R}" fill="none" stroke="${isWork?'#2A1F18':'#182028'}" stroke-width="7"/>
                <circle cx="128" cy="128" r="${R}" fill="none" stroke="${isWork?'#C8906A':'#6A9EB0'}" stroke-width="7"
                  stroke-linecap="round"
                  stroke-dasharray="${dash} ${circ}"
                  stroke-dashoffset="0"
                  transform="rotate(-90 128 128)"
                  style="transition:stroke-dasharray 0.6s linear"/>
              </svg>
              <div class="time-overlay">
                <div class="time-num ${isWork?'work':'break'}">${pad(minutes)}:${pad(seconds)}</div>
                ${!isWork ? '<div class="break-hint">😌 พักผ่อนสักครู่</div>' : ''}
              </div>
            </div>
            <div class="info-row">
              <div class="info-item">
                <span class="info-key">ทำงาน</span>
                <span class="info-val-work">${workMin} นาที</span>
              </div>
              <div class="divider-v"></div>
              <div class="info-item">
                <span class="info-key">พัก</span>
                <span class="info-val-break">${breakMin} นาที</span>
              </div>
            </div>
            <button class="stop-btn" onclick="stop()">⏹ หยุด</button>
          </div>
        </div>`;
    }
  }

  window.setWork = m => setState({ workMin: m });
  window.setBreak = m => setState({ breakMin: m });
  window.start = start;
  window.stop = stop;

  render();
</script>

</body>
</html>
